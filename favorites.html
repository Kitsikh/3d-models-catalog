<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное - HaloMesh</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="site-logo">HM</a>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">Г<span class="nav-label">Главная</span></a>
                <a href="favorites.html" class="nav-link active">И<span class="nav-label">Избранное</span></a>
                <a href="authors.html" class="nav-link">А<span class="nav-label">Авторы</span></a>
                <a href="guide.html" class="nav-link">Г<span class="nav-label">Гайд</span></a>
            </nav>
        </div>
        <div class="sidebar-bottom">
            <button id="theme-toggle" class="theme-btn">Т</button>
        </div>
    </aside>

    <header class="top-bar">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Поиск моделей...">
        </div>
        <div class="user-menu">
            <button class="avatar-btn" id="avatar-toggle">
                <div class="avatar-circle">К</div>
            </button>
        </div>
    </header>

    <main class="main-content">
        <!-- Заголовок страницы -->
        <div class="page-header">
            <h1 class="page-title">Избранное</h1>
            <p class="page-subtitle" id="favorites-count">0 моделей</p>
        </div>
        
        <!-- Сетка избранного (такая же как на главной) -->
        <div class="masonry-grid" id="favorites-grid"></div>
        
        <!-- Пустое состояние -->
        <div id="favorites-empty" style="display:none; text-align:center; padding:60px 20px;">
            <div style="font-size:64px; margin-bottom:16px;">♡</div>
            <h2 style="font-size:24px; margin-bottom:8px;">Пока пусто</h2>
            <p style="color:var(--text-secondary); margin-bottom:24px;">Добавьте модели в избранное, чтобы они появились здесь</p>
            <a href="index.html" class="btn-action btn-download" style="display:inline-block; text-decoration:none;">Перейти к каталогу</a>
        </div>
        
        <!-- Загрузка -->
        <div id="favorites-loading" style="text-align:center; padding:40px; color:var(--text-secondary);">
            Загрузка...
        </div>
    </main>
    
    <script src="js/main.js" defer></script>
</body>
</html>
